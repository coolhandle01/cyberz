name: CI

on:
  push:
    branches: ["main", "fix/**", "feat/**", "chore/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff - lint
        run: ruff check .

      - name: ruff - format check
        run: ruff format --check .

      - name: mypy - type check
        run: mypy . --ignore-missing-imports

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write  # required by dorny/test-reporter to post check runs
    env:
      # Dummy creds so H1Client can be imported without KeyError. The contact
      # email seeds the User-Agent helper - see tools/http.py and #46.
      H1_API_USERNAME: ci-user
      H1_API_TOKEN: ci-token
      CYBERSQUAD_CONTACT_EMAIL: ci@example.invalid
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: pytest (unit only)
        run: pytest -m unit --cov --cov-report=term-missing --cov-report=xml:coverage.xml --cov-report=html --junit-xml=junit.xml

      - name: Publish test results
        uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5  # v1.9.1
        if: always()
        with:
          name: pytest results
          path: junit.xml
          reporter: java-junit

      - name: Upload coverage HTML
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

      - name: Upload coverage data
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage
          path: .coverage
          include-hidden-files: true

  sast:
    name: SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required by github/codeql-action/upload-sarif
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install SAST tools
        run: pip install 'bandit[toml,sarif]' semgrep

      - name: bandit - security lint
        run: bandit -c pyproject.toml -r . -f sarif -o bandit.sarif -q

      - name: Upload bandit SARIF
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8  # v3.29.4
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: semgrep - SAST scan
        if: always()
        run: semgrep scan --config=.semgrep.yml --error --quiet --sarif-output=semgrep.sarif

      - name: Upload semgrep SARIF
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8  # v3.29.4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Build prod target (no push)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: .
          target: prod
          push: false
          tags: cybersquad:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build debug target (no push)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83  # v6.18.0
        with:
          context: .
          target: debug
          push: false
          tags: cybersquad:debug
          cache-from: type=gha
