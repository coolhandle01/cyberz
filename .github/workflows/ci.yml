name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**", "refactor/**", "chore/**", "ci/**", "build/**", "test/**", "docs/**", "perf/**", "style/**", "revert/**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff - lint
        run: ruff check .

      - name: ruff - format check
        run: ruff format --check .

      - name: mypy - type check
        run: mypy . --ignore-missing-imports

      - name: pylint - design rules
        run: pylint .

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      checks: write  # required by dorny/test-reporter to post check runs
    env:
      # Dummy creds so H1Client can be imported without KeyError. The contact
      # email seeds the User-Agent helper - see tools/http.py and #46.
      H1_API_USERNAME: ci-user
      H1_API_TOKEN: ci-token
      CYBERSQUAD_CONTACT_EMAIL: ci@example.invalid
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # diff-cover compares PR HEAD against the base branch; without
          # the base ref in the local clone the gate cannot compute a
          # diff. fetch-depth: 0 grabs full history once - the repo is
          # small and this is simpler than a separate ``git fetch
          # origin <base-ref>`` step that has to handle every base.
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: pytest (unit only)
        run: pytest -m unit --cov --cov-report=term-missing --cov-report=xml:coverage.xml --cov-report=html --junit-xml=junit.xml

      - name: Diff coverage (per-PR ratchet)
        # Fails when a line added or modified by the PR is not covered by
        # tests (--fail-under=100 on the diff, not the whole codebase).
        # Stacked on top of the absolute fail_under floor in pyproject.toml:
        # the floor catches large drops, this catches slow drift on touched
        # lines. PR-only - on push-to-branch events there is no base ref
        # to diff against and the gate would always trivially pass.
        if: github.event_name == 'pull_request'
        run: diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=100

      - name: Publish test results
        uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5  # v1.9.1
        if: always()
        with:
          name: pytest results
          path: junit.xml
          reporter: java-junit

      - name: Upload coverage HTML
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

      - name: Upload coverage data
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage
          path: .coverage
          include-hidden-files: true

  sast:
    name: SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required by github/codeql-action/upload-sarif
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install SAST tools
        run: pip install 'bandit[toml,sarif]' semgrep

      - name: bandit - security lint
        run: bandit -c pyproject.toml -r . -f sarif -o bandit.sarif -q

      - name: Upload bandit SARIF
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8  # v3.29.4
        if: always()
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: semgrep - SAST scan
        if: always()
        run: semgrep scan --config=.semgrep.yml --error --quiet --sarif-output=semgrep.sarif

      - name: Upload semgrep SARIF
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8  # v3.29.4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
