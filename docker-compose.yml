# docker-compose.yml - Local debug environment. See README.md for usage.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes:
      - litellm-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      DATABASE_URL: "postgresql://litellm:litellm@postgres:5432/litellm"
    volumes:
      - ./litellm_config.yml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  cybersquad:
    build:
      context: .
      dockerfile: Dockerfile
      target: debug
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      OPENAI_API_BASE: "http://litellm:4000"
      # CREWAI_MODEL: "litellm/claude-sonnet"  # uncomment to route via proxy
    volumes:
      - .:/app
      - cybersquad-reports:/app/reports
      - nuclei-templates:/root/.local/nuclei-templates
    depends_on:
      litellm:
        condition: service_healthy

volumes:
  cybersquad-reports:
  nuclei-templates:
  litellm-db:
